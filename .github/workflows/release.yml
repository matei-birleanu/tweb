name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Generate changelog
      id: changelog
      uses: metcalfc/changelog-generator@v4.1.0
      with:
        myToken: ${{ secrets.GITHUB_TOKEN }}

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        body: ${{ steps.changelog.outputs.changelog }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-artifacts:
    runs-on: ubuntu-latest
    needs: create-release

    strategy:
      matrix:
        service: [ApiGateway, ProductService, OrderService]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Publish ${{ matrix.service }}
      run: |
        cd backend/${{ matrix.service }}
        dotnet publish -c Release -r linux-x64 --self-contained -o ./publish

    - name: Create archive
      run: |
        cd backend/${{ matrix.service }}/publish
        tar -czf ../../../${{ matrix.service }}-${{ github.ref_name }}-linux-x64.tar.gz .

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v1
      with:
        files: ${{ matrix.service }}-${{ github.ref_name }}-linux-x64.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-frontend-artifact:
    runs-on: ubuntu-latest
    needs: create-release

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: |
        cd frontend
        npm ci

    - name: Build frontend
      run: |
        cd frontend
        npm run build
      env:
        REACT_APP_API_URL: /api
        REACT_APP_KEYCLOAK_URL: /auth
        REACT_APP_KEYCLOAK_REALM: shop-platform
        REACT_APP_KEYCLOAK_CLIENT_ID: shop-client

    - name: Create archive
      run: |
        cd frontend
        tar -czf ../frontend-${{ github.ref_name }}.tar.gz build/

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v1
      with:
        files: frontend-${{ github.ref_name }}.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-release:
    runs-on: ubuntu-latest
    needs: create-release
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract version
      id: version
      run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Build and push all services
      run: |
        services="ApiGateway ProductService OrderService"
        for service in $services; do
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --tag ghcr.io/${{ github.repository_owner }}/shop-${service,,}:${{ steps.version.outputs.version }} \
            --tag ghcr.io/${{ github.repository_owner }}/shop-${service,,}:latest \
            --file backend/${service}/Dockerfile \
            --push \
            backend/
        done

        docker buildx build \
          --platform linux/amd64,linux/arm64 \
          --tag ghcr.io/${{ github.repository_owner }}/shop-frontend:${{ steps.version.outputs.version }} \
          --tag ghcr.io/${{ github.repository_owner }}/shop-frontend:latest \
          --file frontend/Dockerfile \
          --push \
          frontend/

  notify:
    runs-on: ubuntu-latest
    needs: [create-release, build-artifacts, build-frontend-artifact, docker-release]
    if: always()

    steps:
    - name: Send notification
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        text: 'Release ${{ github.ref_name }} ${{ job.status }}'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
      if: always()
